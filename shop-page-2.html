<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Boutique IRIS - page 2.">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <link rel="manifest" href="assets/images/site.webmanifest">
    <link rel="stylesheet" href="./assets/css/shop.css">
    <title>Boutique IRIS - Page 2</title>
</head>

<body>
    <nav class="shop-topbar" aria-label="Navigation principale boutique">
        <div class="shop-topbar-links">
            <a class="shop-page-link" href="./shop.html">Accueil</a>
            <a class="shop-page-link active" href="./shop-page-2.html" aria-current="page">Produits</a>
            <a class="shop-page-link" href="./shop-page-3.html">Panier</a>
        </div>
    </nav>

    <header class="shop-hero">
        <p class="shop-badge">Equipe IRIS</p>
        <h1>Catalogue produits</h1>
        <p class="shop-intro">Ajoutez vos produits au panier, puis finalisez sur la page panier.</p>
    </header>

    <main class="shop-main shop-main-single">
        <section class="shop-toolbar" aria-label="Filtres boutique">
            <div class="toolbar-group">
                <label for="filtre-categorie">Categorie</label>
                <select id="filtre-categorie">
                    <option value="tous">Toutes</option>
                    <option value="protection">Protection</option>
                    <option value="transport">Transport</option>
                    <option value="terrain">Terrain</option>
                    <option value="communication">Communication</option>
                </select>
            </div>
            <div class="toolbar-group">
                <label for="recherche">Recherche</label>
                <input id="recherche" type="text" placeholder="Ex: sac, gants, lampe...">
            </div>
            <div class="toolbar-group toolbar-panier" aria-live="polite">
                <span>Articles</span>
                <strong data-cart-count>0</strong>
            </div>
        </section>

        <section>
            <div id="catalogue" class="catalogue" aria-live="polite"></div>
        </section>

        <a class="shop-cta" href="./shop-page-3.html">Voir le panier</a>
    </main>

    <footer class="shop-footer">
        <p>Boutique IRIS</p>
        <a class="shop-back-button" href="./index.html">Retour au site de presentation</a>
    </footer>

    <script src="./assets/js/shop.js"></script>
</body>

</html>
